<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>100 Things I Love About You 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#fff8f9; --accent:#d4638a; --accent2:#a78bbb; --muted:#9a7f8a; --text:#2a1f25; --card:#ffffff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:"DM Sans",system-ui,sans-serif;
      background:var(--bg);
      min-height:100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -5%, rgba(212,99,138,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 55% 35% at 100% 100%, rgba(167,139,187,0.1) 0%, transparent 50%);
    }
    .back { padding:1.2rem 1.5rem 0; }
    .back a { color:var(--accent); font-weight:600; text-decoration:none; font-size:0.95rem; }
    .back a:hover { text-decoration:underline; }
    header { text-align:center; padding:1.5rem 1rem 0.5rem; }
    header h1 { font-family:Fraunces,Georgia,serif; font-size:clamp(1.8rem,5vw,2.6rem); font-weight:500; color:var(--text); margin-bottom:0.35rem; }
    header h1 em { font-style:italic; color:var(--accent); }
    header p { color:var(--muted); font-size:0.93rem; }

    .counter {
      text-align:center;
      margin:1.2rem 0 0;
      font-family:Fraunces,Georgia,serif;
      font-size:clamp(2.5rem,8vw,4rem);
      color:var(--accent);
      line-height:1;
    }
    .counter-label { color:var(--muted); font-size:0.85rem; margin-top:0.2rem; }

    .list-wrap {
      max-width:640px;
      margin:2rem auto 0;
      padding:0 1.25rem 5rem;
      display:grid;
      gap:0.65rem;
    }

    .item {
      background:var(--card);
      border-radius:14px;
      padding:0.9rem 1.1rem 0.9rem 1rem;
      display:flex;
      align-items:flex-start;
      gap:0.8rem;
      box-shadow:0 4px 18px rgba(42,31,37,0.06);
      border:1px solid rgba(0,0,0,0.045);
      opacity:0;
      transform:translateY(16px);
      transition:opacity 0.4s ease, transform 0.4s ease;
    }
    .item.visible { opacity:1; transform:translateY(0); }

    .num {
      font-family:Fraunces,Georgia,serif;
      font-size:0.8rem;
      color:var(--accent);
      min-width:28px;
      padding-top:2px;
      font-weight:500;
      opacity:0.7;
    }
    .text {
      font-size:0.97rem;
      color:var(--text);
      line-height:1.5;
    }

    /* alternate card accent */
    .item:nth-child(3n) { border-left:3px solid var(--accent2); }
    .item:nth-child(3n+1) { border-left:3px solid var(--accent); }
    .item:nth-child(3n+2) { border-left:3px solid #f4a0c0; }

    /* last card special */
    .item:last-child {
      background:linear-gradient(135deg, #ffe0ec, #f0d4f8);
      border:1px solid rgba(212,99,138,0.25);
      padding:1.2rem 1.3rem;
    }
    .item:last-child .text { font-family:Fraunces,Georgia,serif; font-style:italic; font-size:1.05rem; color:#3a2030; }
    .item:last-child .num { color:#c01050; opacity:1; font-size:0.9rem; }
  </style>
</head>
<body>
  <p class="back"><a href="index.html">← back home</a></p>

    var list = document.getElementById('list');
    THINGS.forEach(function(t, i){
      var div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = '<span class="num">' + (i+1) + '</span><span class="text">' + t + '</span>';
      list.appendChild(div);
    });

    // staggered reveal on scroll
    var items = document.querySelectorAll('.item');
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          setTimeout(function(){ e.target.classList.add('visible'); }, 60);
          obs.unobserve(e.target);
        }
      });
    }, { threshold:0.1 });
    items.forEach(function(el){ obs.observe(el); });
